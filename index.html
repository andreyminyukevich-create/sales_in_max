<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keep1R Витрина</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #0D0B14; color: #F0EDE6;
    min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden;
  }
  :root {
    --p: #7C3AED; --pl: #A78BFA; --pd: rgba(124,58,237,0.12); --pb: rgba(124,58,237,0.35);
    --s: #13101E; --s2: #1C1729; --s3: #261F38;
    --t: #F0EDE6; --t2: #9B94B0; --brd: rgba(255,255,255,0.07);
    --r: 14px; --rsm: 10px; --err: #E24B4A;
  }
  button { border: none; cursor: pointer; font-family: inherit; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,11,20,0.93); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--brd);
    padding: 13px 16px 11px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-text { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; color: var(--t); text-transform: uppercase; }
  .logo-text span { color: var(--pl); }
  .logo-sub { font-size: 10px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 1px; border-left: 1px solid var(--brd); padding-left: 8px; }
  .cart-btn { background: var(--pd); border: 1px solid var(--pb); border-radius: 50px; padding: 8px 14px; display: flex; align-items: center; gap: 7px; color: var(--pl); font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .cart-btn:active { transform: scale(0.97); }
  .cart-badge { background: var(--p); color: #fff; border-radius: 50px; font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center; }

  .hero { padding: 18px 16px 10px; border-bottom: 1px solid var(--brd); }
  .hero-label { font-size: 10px; font-weight: 700; color: var(--pl); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  .hero h1 { font-size: 24px; font-weight: 900; line-height: 1.1; text-transform: uppercase; letter-spacing: -0.5px; margin-bottom: 6px; }
  .hero p { font-size: 13px; color: var(--t2); line-height: 1.5; }

  .tabs-wrap { padding: 12px 0 0; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 6px; padding: 0 16px 12px; min-width: max-content; border-bottom: 1px solid var(--brd); }
  .tab { background: var(--s2); border: 1px solid var(--brd); border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; white-space: nowrap; }
  .tab.active { background: var(--pd); border-color: var(--pb); color: var(--pl); }

  .products { padding: 12px 16px 110px; display: flex; flex-direction: column; gap: 10px; }

  .card { background: var(--s); border: 1px solid var(--brd); border-radius: var(--r); overflow: hidden; position: relative; }
  .card.bestseller { border-color: var(--pb); }
  .hit-badge { position: absolute; top: 12px; right: 12px; background: var(--p); color: #fff; font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; padding: 3px 7px; }

  .card-head { display: flex; gap: 12px; padding: 14px 14px 0; align-items: flex-start; }
  .card-emoji { width: 48px; height: 48px; flex-shrink: 0; background: var(--s2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid var(--brd); }
  .card-title-block { flex: 1; min-width: 0; padding-right: 70px; }
  .card-name { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.1; margin-bottom: 4px; color: var(--t); }
  .card-specs-inline { font-size: 11px; color: var(--t2); line-height: 1.6; }
  .card-desc { font-size: 13px; color: var(--t2); line-height: 1.45; padding: 10px 14px 0; }

  /* Pricing — кликабельные колонки */
  .pricing { display: grid; grid-template-columns: 1fr 1fr 1fr; margin: 12px 14px 0; border: 1px solid var(--brd); border-radius: var(--rsm); overflow: hidden; }
  .price-col {
    padding: 10px 8px; text-align: center; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .price-col:not(:last-child) { border-right: 1px solid var(--brd); }
  .price-col:hover { background: rgba(124,58,237,0.07); }
  .price-col.selected { background: var(--pd); }
  .price-col.selected::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--p);
  }
  .price-label { font-size: 10px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
  .price-val { font-size: 15px; font-weight: 800; color: var(--t); }
  .price-val.hl { color: var(--pl); }
  .price-col.selected .price-val { color: var(--pl); }
  .price-col.selected .price-label { color: var(--pl); }
  .price-note { font-size: 9px; color: var(--t2); margin-top: 2px; }

  /* Qty input area */
  .qty-input-wrap {
    margin: 10px 14px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .qty-input-label { font-size: 12px; color: var(--t2); white-space: nowrap; }
  .qty-input {
    background: var(--s2); border: 1px solid var(--pb);
    border-radius: 8px; color: var(--t);
    font-size: 15px; font-weight: 700; font-family: inherit;
    padding: 7px 12px; width: 90px; outline: none;
    text-align: center;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .qty-input:focus { border-color: var(--pl); }
  .qty-total { font-size: 13px; font-weight: 700; color: var(--pl); }

  /* Card footer */
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 14px; }
  .warranty { font-size: 11px; color: var(--t2); }

  .buy-btn {
    background: var(--p); color: #fff; border-radius: 8px; padding: 9px 16px;
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
    transition: all 0.2s; opacity: 0.4;
  }
  .buy-btn.ready { opacity: 1; }
  .buy-btn.ready:active { transform: scale(0.96); background: #6D28D9; }

  /* In-cart controls */
  .in-cart-wrap { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .in-cart-tag { font-size: 10px; color: var(--pl); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .remove-btn { font-size: 11px; color: var(--t2); background: none; border: none; cursor: pointer; text-decoration: underline; }

  /* Cart sheet */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
  .sheet { background: var(--s); border-radius: 20px 20px 0 0; border-top: 1px solid var(--pb); max-height: 88vh; display: flex; flex-direction: column; animation: slideUp 0.25s cubic-bezier(0.34,1.4,0.64,1); }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .handle { width: 40px; height: 4px; background: var(--s3); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .sheet-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .sheet-title { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
  .close { background: var(--s3); color: var(--t2); border-radius: 50%; width: 30px; height: 30px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .sheet-body { flex: 1; overflow-y: auto; padding: 4px 16px; }
  .sheet-foot { padding: 14px 16px 28px; border-top: 1px solid var(--brd); flex-shrink: 0; }

  .cart-row { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--brd); }
  .cart-icon { width: 44px; height: 44px; background: var(--s2); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-name { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-meta { font-size: 11px; color: var(--t2); margin-bottom: 1px; }
  .cart-price { font-size: 13px; color: var(--pl); font-weight: 700; }
  .cart-remove { background: none; color: var(--t2); font-size: 18px; padding: 4px; flex-shrink: 0; }

  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 16px; }
  .total-label { font-size: 13px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .total-sum { font-size: 22px; font-weight: 800; color: var(--pl); }
  .pay-btn { width: 100%; background: var(--p); color: #fff; border-radius: var(--r); padding: 16px; font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .pay-btn:active { transform: scale(0.98); }
  .pay-btn:disabled { opacity: 0.5; cursor: default; }
  .sbp { font-size: 12px; opacity: 0.7; font-weight: 600; text-transform: none; letter-spacing: 0; }

  .empty { text-align: center; padding: 48px 0; color: var(--t2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--err); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 999; white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const PRODUCTS = [
  { id:1, name:"Базовая", cat:"gloss", desc:"Отлично подходит для лекал на элементы интерьера. Клей цепкий, стартовая адгезия высокая, с праймером дружит", specs:"Лаковый слой: средний · Толщина: 190 мкр · Рулон 15 м", warranty:"5 лет", pc:3000, pr:45000, pb:35000, hit:false },
  { id:2, name:"Базовая Про", cat:"gloss", desc:"Предсказуемое поведение плёнки, клей цепкий, но без агрессии — можно работать привычным раствором. Идеальный глянец без шагрени. Сильный гидрофобный эффект", specs:"Лаковый слой: средний · Толщина: 190 мкр · Рулон 15 м", warranty:"7 лет", pc:3690, pr:55000, pb:45000, hit:true },
  { id:3, name:"Базовая Лёгкая", cat:"gloss", desc:"Идеальный глянец, цепкий клей, сильный гидрофоб. Аналог Basic Pro с мягким топом", specs:"Лаковый слой: мягкий · Толщина: 190 мкр · Рулон 15 м", warranty:"7 лет", pc:3690, pr:55000, pb:45000, hit:false },
  { id:4, name:"Базовый Сатин", cat:"satin", desc:"Сатин с заметным блеском, эластичная, клей не агрессивный, удобный", specs:"Лаковый слой: средний · Толщина: 190 мкр · Рулон 15 м", warranty:"5 лет", pc:4350, pr:65000, pb:55000, hit:false },
  { id:5, name:"Эластичная", cat:"gloss", desc:"Мягкая, эластичная, легко принимает форму. Лёгкая шагрень маскирует косячки ЛКП", specs:"Лаковый слой: мягкий · Толщина: 190 мкр · Рулон 15 м", warranty:"7 лет", pc:4190, pr:62000, pb:52000, hit:false },
  { id:6, name:"Эластичный Мат", cat:"matte", desc:"Эластичная, простая в установке, выглядит дорого", specs:"Лаковый слой: мягкий · Толщина: 190 мкр · Рулон 15 м", warranty:"7 лет", pc:4350, pr:65000, pb:55000, hit:false },
  { id:7, name:"Эластичный Сатин", cat:"satin", desc:"Простая в установке, эластичная, клей понятный. Не сильно блестит", specs:"Лаковый слой: мягкий · Толщина: 190 мкр · Рулон 15 м", warranty:"7 лет", pc:4490, pr:67000, pb:57000, hit:false },
  { id:8, name:"Тонирующая 30-50-70", cat:"smoke", desc:"50 — фиолетовый оттенок, 70 — серый. Тонирующий полиуретан для оптики", specs:"Лаковый слой: средний · Толщина: 215 мкр · Рулон 15 м", warranty:"5 лет", pc:5500, pr:80000, pb:70000, hit:false },
];

const CATS = [
  { id:"all", label:"Все" },
  { id:"gloss", label:"Глянец" },
  { id:"satin", label:"Сатин" },
  { id:"matte", label:"Мат" },
  { id:"smoke", label:"Тонирующая" },
];

const fmt = n => n.toLocaleString("ru-RU");

// type: "cut" | "roll" | "bulk"
// qty: метры (cut) или кол-во рулонов (roll=1, bulk>=10)
function calcPrice(p, type, qty) {
  if (type === "cut") return p.pc * qty;
  if (type === "roll") return p.pr * qty;
  if (type === "bulk") return p.pb * qty;
  return 0;
}

function typeLabel(type, qty) {
  if (type === "cut") return `Отрез ${qty} м`;
  if (type === "roll") return qty === 1 ? "1 рулон" : `${qty} рулонов`;
  if (type === "bulk") return `Опт ${qty} рулонов`;
  return "";
}

// ── ProductCard ───────────────────────────────
function ProductCard({ p, cartItem, onAdd, onRemove }) {
  const [selType, setSelType] = useState(null); // "cut"|"roll"|"bulk"
  const [inputQty, setInputQty] = useState("");

  const needsInput = selType === "cut" || selType === "bulk";

  const qtyNum = parseInt(inputQty) || 0;
  const isValid = selType === "roll"
    ? true
    : selType === "cut" ? qtyNum >= 1
    : selType === "bulk" ? qtyNum >= 10
    : false;

  const finalQty = selType === "roll" ? 1 : qtyNum;
  const total = selType && isValid ? calcPrice(p, selType, finalQty) : null;

  const handleColClick = (type) => {
    if (cartItem) return;
    setSelType(prev => prev === type ? null : type);
    setInputQty("");
  };

  const handleAdd = () => {
    if (!isValid || !selType) return;
    onAdd({ type: selType, qty: finalQty, unitPrice: selType === "cut" ? p.pc : selType === "roll" ? p.pr : p.pb });
    setSelType(null);
    setInputQty("");
  };

  return (
    <div className={"card" + (p.hit ? " bestseller" : "")}>
      {p.hit && <div className="hit-badge">Хит продаж</div>}

      <div className="card-head">
        <div className="card-emoji">🧑‍🚀</div>
        <div className="card-title-block">
          <div className="card-name">{p.name}</div>
          <div className="card-specs-inline">{p.specs}</div>
        </div>
      </div>

      <div className="card-desc">{p.desc}</div>

      {/* Pricing columns */}
      <div className="pricing">
        {[
          { type:"cut",  label:"Отрез",    val:fmt(p.pc)+" ₽", note:"за пог. м" },
          { type:"roll", label:"Рулон",    val:fmt(p.pr)+" ₽", note:"15 м", hl:true },
          { type:"bulk", label:"От 10 шт", val:fmt(p.pb)+" ₽", note:"за рулон" },
        ].map(col => (
          <div
            key={col.type}
            className={"price-col" + (selType === col.type ? " selected" : "")}
            onClick={() => handleColClick(col.type)}
          >
            <div className="price-label">{col.label}</div>
            <div className={"price-val" + (col.hl && !selType ? " hl" : "")}>{col.val}</div>
            <div className="price-note">{col.note}</div>
          </div>
        ))}
      </div>

      {/* Input для отреза и опта */}
      {!cartItem && needsInput && (
        <div className="qty-input-wrap">
          <span className="qty-input-label">
            {selType === "cut" ? "Метров:" : "Рулонов (мин 10):"}
          </span>
          <input
            className="qty-input"
            type="number"
            min={selType === "bulk" ? 10 : 1}
            value={inputQty}
            onChange={e => setInputQty(e.target.value)}
            placeholder={selType === "bulk" ? "10" : "1"}
          />
          {total !== null && isValid && (
            <span className="qty-total">{fmt(total)} ₽</span>
          )}
        </div>
      )}

      <div className="card-footer">
        <div className="warranty">🛡️ Гарантия {p.warranty}</div>
        {cartItem ? (
          <div className="in-cart-wrap">
            <div className="in-cart-tag">✓ В корзине</div>
            <button className="remove-btn" onClick={onRemove}>Убрать</button>
          </div>
        ) : (
          <button
            className={"buy-btn" + (selType && isValid ? " ready" : "")}
            onClick={handleAdd}
            disabled={!selType || !isValid}
          >
            В корзину
          </button>
        )}
      </div>
    </div>
  );
}

// ── CartSheet ─────────────────────────────────
function CartSheet({ cart, products, onClose, onRemove, onPay, paying }) {
  const total = cart.reduce((s, i) => s + i.unitPrice * i.qty, 0);

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="handle" />
        <div className="sheet-head">
          <span className="sheet-title">Корзина</span>
          <button className="close" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">
          {cart.length === 0 ? (
            <div className="empty"><div className="empty-icon">🛒</div><div>Корзина пуста</div></div>
          ) : cart.map(item => {
            const p = products.find(x => x.id === item.productId);
            if (!p) return null;
            return (
              <div key={item.id} className="cart-row">
                <div className="cart-icon">🧑‍🚀</div>
                <div className="cart-info">
                  <div className="cart-name">{p.name}</div>
                  <div className="cart-meta">{typeLabel(item.type, item.qty)}</div>
                  <div className="cart-price">{fmt(item.unitPrice * item.qty)} ₽</div>
                </div>
                <button className="cart-remove" onClick={() => onRemove(item.id)}>✕</button>
              </div>
            );
          })}
        </div>
        {cart.length > 0 && (
          <div className="sheet-foot">
            <div className="total-row">
              <span className="total-label">Итого</span>
              <span className="total-sum">{fmt(total)} ₽</span>
            </div>
            <button className="pay-btn" disabled={paying} onClick={onPay}>
              {paying
                ? <><div className="spinner" /> Создаём счёт...</>
                : <>Оплатить <span className="sbp">· СБП</span></>}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────
function App() {
  const [cat, setCat] = useState("all");
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [paying, setPaying] = useState(false);
  const [toast, setToast] = useState(null);
  const timer = useRef(null);

  const showToast = msg => {
    setToast(msg);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setToast(null), 4000);
  };

  const cartCount = cart.length;
  const filtered = cat === "all" ? PRODUCTS : PRODUCTS.filter(p => p.cat === cat);

  const addToCart = (productId, { type, qty, unitPrice }) => {
    setCart(c => [...c, { id: Date.now(), productId, type, qty, unitPrice }]);
  };

  const removeFromCart = (itemId) => {
    setCart(c => c.filter(i => i.id !== itemId));
  };

  const handlePay = async () => {
    if (paying) return;
    setPaying(true);
    try {
      const orderId = "K1R-" + Date.now().toString(36).toUpperCase();
      const items = cart.map(i => {
        const p = PRODUCTS.find(x => x.id === i.productId);
        return { name: `${p.name} — ${typeLabel(i.type, i.qty)}`, price: i.unitPrice, qty: i.qty };
      });
      const res = await fetch("/api/create-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items, orderId }),
      });
      const data = await res.json();
      if (!res.ok || !data.paymentUrl) throw new Error(data.error || "Ошибка создания счёта");
      window.location.href = data.paymentUrl;
    } catch (err) {
      showToast(err.message || "Ошибка оплаты, попробуйте ещё раз");
    } finally {
      setPaying(false);
    }
  };

  return (
    <>
      <div className="header">
        <div className="logo">
          <div className="logo-text">Keep<span>1R</span></div>
          <div className="logo-sub">Витрина</div>
        </div>
        <button className="cart-btn" onClick={() => setCartOpen(true)}>
          <span>🛒</span>
          <span>Корзина</span>
          {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
        </button>
      </div>

      <div className="hero">
        <div className="hero-label">Защитные плёнки · Опт и розница</div>
        <h1>Защитные<br />плёнки</h1>
        <p>Рулон 15 м · Глянец, сатин, матт</p>
      </div>

      <div className="tabs-wrap">
        <div className="tabs">
          {CATS.map(c => (
            <button key={c.id} className={"tab" + (cat === c.id ? " active" : "")} onClick={() => setCat(c.id)}>
              {c.label}
            </button>
          ))}
        </div>
      </div>

      <div className="products">
        {filtered.map(p => {
          const cartItem = cart.find(i => i.productId === p.id);
          return (
            <ProductCard
              key={p.id} p={p}
              cartItem={cartItem}
              onAdd={(opts) => addToCart(p.id, opts)}
              onRemove={() => cartItem && removeFromCart(cartItem.id)}
            />
          );
        })}
      </div>

      {cartOpen && (
        <CartSheet
          cart={cart} products={PRODUCTS}
          onClose={() => setCartOpen(false)}
          onRemove={removeFromCart}
          onPay={handlePay} paying={paying}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
