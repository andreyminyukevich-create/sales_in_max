<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PPF Плёнки</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #0A0A0C;
    color: #F0EDE6;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-border: rgba(201,168,76,0.3);
    --surface: #111115;
    --surface2: #18181E;
    --surface3: #222228;
    --text: #F0EDE6;
    --text2: #9B9890;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
    --radius-sm: 10px;
    --danger: #E24B4A;
  }
  button { border: none; cursor: pointer; font-family: inherit; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,12,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 18px; font-weight: 700; }
  .logo span { color: var(--gold); }
  .cart-btn {
    background: var(--gold-dim); border: 1px solid var(--gold-border);
    border-radius: 50px; padding: 8px 14px;
    display: flex; align-items: center; gap: 7px;
    color: var(--gold-light); font-size: 14px; font-weight: 500;
    transition: all 0.2s;
  }
  .cart-btn:active { transform: scale(0.97); }
  .cart-badge {
    background: var(--gold); color: #0A0A0C;
    border-radius: 50px; font-size: 11px; font-weight: 700;
    padding: 1px 6px; min-width: 18px; text-align: center;
  }

  .hero { padding: 20px 16px 8px; }
  .hero h1 { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .hero h1 span { color: var(--gold); }
  .hero p { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .tabs-wrap { padding: 14px 0 4px; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 8px; padding: 0 16px; min-width: max-content; }
  .tab {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50px; padding: 8px 16px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    transition: all 0.2s; white-space: nowrap;
  }
  .tab.active { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold-light); }

  .products { padding: 12px 16px 110px; display: flex; flex-direction: column; gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-img {
    width: 100%; height: 120px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; position: relative;
  }
  .badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(10,10,12,0.8); border: 1px solid var(--border);
    border-radius: 6px; font-size: 11px; font-weight: 600;
    color: var(--gold-light); padding: 3px 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-body { padding: 14px; }
  .card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--text2); line-height: 1.4; margin-bottom: 10px; }
  .specs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .spec { background: var(--surface3); border-radius: 6px; font-size: 11px; color: var(--text2); padding: 4px 9px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .price { font-size: 18px; font-weight: 700; color: var(--gold); }
  .price-unit { font-size: 13px; font-weight: 400; color: var(--text2); }
  .out-of-stock { font-size: 13px; color: var(--text2); }

  .add-btn {
    background: var(--gold); color: #0A0A0C;
    border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 700; transition: all 0.2s;
  }
  .add-btn:active { transform: scale(0.96); }

  .qty { display: flex; align-items: center; gap: 10px; }
  .qty-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface3); color: var(--text);
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; color: var(--gold); }

  /* Cart sheet */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 200; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    max-height: 88vh; display: flex; flex-direction: column;
    animation: slideUp 0.25s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .handle { width: 40px; height: 4px; background: var(--surface3); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .sheet-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .sheet-title { font-size: 18px; font-weight: 700; }
  .close { background: var(--surface3); color: var(--text2); border-radius: 50%; width: 30px; height: 30px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .sheet-body { flex: 1; overflow-y: auto; padding: 4px 16px; }
  .sheet-foot { padding: 14px 16px 28px; border-top: 1px solid var(--border); flex-shrink: 0; }

  .cart-row { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .cart-icon { width: 46px; height: 46px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-sub { font-size: 13px; color: var(--text2); }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 16px; }
  .total-label { font-size: 14px; color: var(--text2); }
  .total-sum { font-size: 22px; font-weight: 700; color: var(--gold); }

  .pay-btn {
    width: 100%; background: var(--gold); color: #0A0A0C;
    border-radius: var(--radius); padding: 16px;
    font-size: 16px; font-weight: 700; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .pay-btn:active { transform: scale(0.98); }
  .pay-btn:disabled { opacity: 0.5; cursor: default; }
  .pay-btn .sbp { font-size: 13px; opacity: 0.75; font-weight: 500; }

  .empty { text-align: center; padding: 48px 0; color: var(--text2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--text2); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* Error toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--danger); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500; z-index: 999;
    animation: fadeInUp 0.3s ease;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px) } to { opacity: 1; transform: translateX(-50%) translateY(0) } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATS = [
  { id: "all", label: "Все" },
  { id: "gloss", label: "Глянец" },
  { id: "matte", label: "Матт" },
  { id: "satin", label: "Сатин" },
];

const CAT_LABELS = { gloss: "Глянец", matte: "Матт", satin: "Сатин" };

function genOrderId() {
  return "ORD-" + Date.now().toString(36).toUpperCase();
}

// ── Qty Control ──────────────────────────────
function Qty({ qty, onInc, onDec }) {
  return (
    <div className="qty">
      <button className="qty-btn" onClick={onDec}>−</button>
      <span className="qty-num">{qty}</span>
      <button className="qty-btn" onClick={onInc}>+</button>
    </div>
  );
}

// ── Product Card ─────────────────────────────
function ProductCard({ p, cartItem, onAdd, onInc, onDec }) {
  return (
    <div className="card">
      <div className="card-img">
        <span>{p.emoji}</span>
        <div className="badge">{CAT_LABELS[p.category] || p.category}</div>
      </div>
      <div className="card-body">
        <div className="card-name">{p.name}</div>
        <div className="card-desc">{p.desc}</div>
        <div className="specs">
          {p.specs.map((s, i) => <span key={i} className="spec">{s}</span>)}
        </div>
        <div className="card-footer">
          <div>
            <span className="price">{p.price.toLocaleString("ru-RU")} ₽</span>
            <span className="price-unit"> / {p.unit}</span>
          </div>
          {!p.in_stock ? (
            <span className="out-of-stock">Нет в наличии</span>
          ) : cartItem ? (
            <Qty qty={cartItem.qty} onInc={onInc} onDec={onDec} />
          ) : (
            <button className="add-btn" onClick={onAdd}>В корзину</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Cart Sheet ───────────────────────────────
function CartSheet({ cart, products, onClose, onInc, onDec, onPay, paying }) {
  const total = cart.reduce((s, i) => {
    const p = products.find(x => x.id === i.id);
    return s + (p ? p.price * i.qty : 0);
  }, 0);
  const empty = cart.length === 0;

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="handle" />
        <div className="sheet-head">
          <span className="sheet-title">Корзина</span>
          <button className="close" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">
          {empty ? (
            <div className="empty">
              <div className="empty-icon">🛒</div>
              <div>Корзина пуста</div>
            </div>
          ) : (
            cart.map(item => {
              const p = products.find(x => x.id === item.id);
              if (!p) return null;
              return (
                <div key={item.id} className="cart-row">
                  <div className="cart-icon">{p.emoji}</div>
                  <div className="cart-info">
                    <div className="cart-name">{p.name}</div>
                    <div className="cart-sub">{(p.price * item.qty).toLocaleString("ru-RU")} ₽</div>
                  </div>
                  <Qty qty={item.qty} onInc={() => onInc(item.id)} onDec={() => onDec(item.id)} />
                </div>
              );
            })
          )}
        </div>
        {!empty && (
          <div className="sheet-foot">
            <div className="total-row">
              <span className="total-label">Итого</span>
              <span className="total-sum">{total.toLocaleString("ru-RU")} ₽</span>
            </div>
            <button className="pay-btn" disabled={paying} onClick={onPay}>
              {paying ? (
                <><div className="spinner" style={{width:18,height:18,borderTopColor:"#0A0A0C"}} /> Создаём счёт...</>
              ) : (
                <> Оплатить <span className="sbp">· СБП</span></>
              )}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────
function App() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cat, setCat] = useState("all");
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [paying, setPaying] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    fetch("/api/products")
      .then(r => r.json())
      .then(data => { setProducts(data); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 4000);
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const filtered = cat === "all" ? products : products.filter(p => p.category === cat);

  const addToCart  = id => setCart(c => [...c, { id, qty: 1 }]);
  const incQty     = id => setCart(c => c.map(i => i.id === id ? {...i, qty: i.qty + 1} : i));
  const decQty     = id => setCart(c => {
    const item = c.find(i => i.id === id);
    if (item.qty <= 1) return c.filter(i => i.id !== id);
    return c.map(i => i.id === id ? {...i, qty: i.qty - 1} : i);
  });

  const handlePay = async () => {
    if (paying) return;
    setPaying(true);
    try {
      const orderId = genOrderId();
      const items = cart.map(i => {
        const p = products.find(x => x.id === i.id);
        return { name: p.name, price: p.price, qty: i.qty };
      });

      const res = await fetch("/api/create-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items, orderId }),
      });

      const data = await res.json();

      if (!res.ok || !data.paymentUrl) {
        throw new Error(data.error || "Не удалось создать счёт");
      }

      // Открываем платёжную страницу Точки
      // В Max это откроется внутри WebView мессенджера
      window.location.href = data.paymentUrl;

    } catch (err) {
      showToast(err.message || "Ошибка оплаты, попробуйте ещё раз");
    } finally {
      setPaying(false);
    }
  };

  return (
    <>
      <div className="header">
        <div className="logo">PPF<span>Shop</span></div>
        <button className="cart-btn" onClick={() => setCartOpen(true)}>
          <span>🛒</span>
          <span>Корзина</span>
          {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
        </button>
      </div>

      <div className="hero">
        <h1>PPF плёнки<br /><span>для вашего авто</span></h1>
        <p>Защитные плёнки от ведущих производителей. Глянец, матт, сатин.</p>
      </div>

      <div className="tabs-wrap">
        <div className="tabs">
          {CATS.map(c => (
            <button key={c.id} className={"tab" + (cat === c.id ? " active" : "")} onClick={() => setCat(c.id)}>
              {c.label}
            </button>
          ))}
        </div>
      </div>

      {loading ? (
        <div className="loading">
          <div className="spinner" />
          <div>Загружаем каталог...</div>
        </div>
      ) : (
        <div className="products">
          {filtered.map(p => (
            <ProductCard
              key={p.id} p={p}
              cartItem={cart.find(i => i.id === p.id)}
              onAdd={() => addToCart(p.id)}
              onInc={() => incQty(p.id)}
              onDec={() => decQty(p.id)}
            />
          ))}
        </div>
      )}

      {cartOpen && (
        <CartSheet
          cart={cart} products={products}
          onClose={() => setCartOpen(false)}
          onInc={incQty} onDec={decQty}
          onPay={handlePay} paying={paying}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
